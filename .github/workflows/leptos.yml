name: Leptos CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: leptos-app
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: leptos-app
      - name: Install Trunk
        run: cargo install trunk --version 0.16.0 --locked
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check workspace
        run: cargo check --workspace
      - name: Test workspace
        run: cargo test --workspace
      - name: Build frontend
        run: trunk build --release
        working-directory: leptos-app/frontend
