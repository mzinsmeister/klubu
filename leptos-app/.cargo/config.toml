# Build against the query metadata committed in `.sqlx/` instead of a live
# database. `sqlx::query!` verifies every statement at compile time, and without
# this it would need a running, already-migrated Postgres just to type-check --
# which breaks fresh clones, CI and `docker build`.
#
# Migrations are applied at *startup* by `sqlx::migrate!()` in backend/src/main.rs,
# which is where they belong; the compiler has no business touching a database.
#
# After changing or adding an SQL query, refresh the metadata against a running
# database:
#
#     cargo sqlx prepare --workspace -- --package backend
#
# `cargo sqlx prepare` overrides this variable for its own child build, so it
# keeps working with this file in place. CI can assert freshness with:
#
#     cargo sqlx prepare --check --workspace -- --package backend
[env]
SQLX_OFFLINE = "true"
