<!DOCTYPE html>
<!-- lang drives the native rendering of <input type="date"> (dd.mm.yyyy). -->
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Klubu</title>
    <!-- Bulma CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Design Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <style>
      :root {
        --accent: #8c67ef;
        --accent-strong: #6f42c1;
        --surface: rgba(22, 18, 38, 0.55);
        --surface-raised: rgba(32, 26, 54, 0.72);
        --border: rgba(140, 103, 239, 0.18);
        --text: #e2e8f0;
        --text-muted: #9aa4bb;
        --sidebar-width: 250px;
      }

      body, button, input, select, textarea, .title, .subtitle {
        font-family: 'Outfit', sans-serif;
      }

      body {
        background: radial-gradient(circle at top right, #1a1235, #08060f) no-repeat;
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
      }

      h1, h2, h3, h4, h5, h6, .title, .subtitle {
        color: #ffffff !important;
      }

      /* ---------------------------------------------------------------
         App shell.
         Deliberately not Bulma's `.columns.is-gapless`: that rule sets
         `padding: 0 !important` on child columns and silently defeats the
         `p-4` / `p-5` helpers, which clipped every page heading.
         --------------------------------------------------------------- */
      .app-shell {
        display: flex;
        align-items: stretch;
        min-height: 100vh;
      }

      .app-sidebar {
        flex: 0 0 var(--sidebar-width);
        width: var(--sidebar-width);
        padding: 1.75rem 1rem;
        position: sticky;
        top: 0;
        align-self: flex-start;
        height: 100vh;
        overflow-y: auto;
        background: rgba(14, 11, 26, 0.9);
        backdrop-filter: blur(20px);
        border-right: 1px solid var(--border);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
      }

      .app-main {
        flex: 1 1 auto;
        min-width: 0; /* let children shrink instead of overflowing the shell */
        padding: 2rem 2.25rem 4rem;
      }

      .app-brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 1.6rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 2rem;
        line-height: 1.2;
      }

      @media (max-width: 900px) {
        .app-shell { flex-direction: column; }
        .app-sidebar {
          flex-basis: auto; width: auto; height: auto;
          position: static; border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .app-main { padding: 1.25rem; }
      }

      .menu-label {
        color: rgba(255, 255, 255, 0.4) !important;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 0.75rem;
      }
      .menu-list a {
        background: transparent !important;
        color: rgba(255, 255, 255, 0.75) !important;
        padding: 0.7rem 1rem;
        border-radius: 8px;
        border-left: 4px solid transparent;
        transition: background 0.2s ease, color 0.2s ease;
      }
      .menu-list a:hover {
        background: rgba(140, 103, 239, 0.15) !important;
        color: #ffffff !important;
      }
      .menu-list a[aria-current="page"] {
        background: rgba(140, 103, 239, 0.3) !important;
        color: #ffffff !important;
        font-weight: 600;
        border-left: 4px solid var(--accent);
      }

      .box {
        background: var(--surface) !important;
        border: 1px solid var(--border) !important;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        color: var(--text) !important;
      }

      /* Nested panel inside a .box. Replaces `has-background-white-ter`,
         which renders as a light block on this dark theme. */
      .subbox {
        background: var(--surface-raised) !important;
        border: 1px solid var(--border) !important;
        border-radius: 10px;
        box-shadow: none;
        backdrop-filter: none;
      }

      /* Clickable rows in the master list. */
      .list-item {
        background: var(--surface-raised) !important;
        border: 1px solid transparent !important;
        border-radius: 10px;
        box-shadow: none;
        cursor: pointer;
        transition: border-color 0.15s ease, transform 0.15s ease;
      }
      .list-item:hover {
        border-color: var(--accent) !important;
        transform: translateX(2px);
      }
      .list-item.is-active {
        border-color: var(--accent) !important;
        background: rgba(140, 103, 239, 0.18) !important;
      }

      /* Secondary text. The old markup used a bare `gray` class, which Bulma
         does not define, so this text rendered at full contrast. */
      .text-muted, .gray {
        color: var(--text-muted) !important;
      }

      .button.is-link {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong)) !important;
        border: none;
        color: #fff !important;
        box-shadow: 0 4px 14px rgba(140, 103, 239, 0.4);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .button.is-link:hover:not([disabled]) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(140, 103, 239, 0.6);
      }
      .button.is-link:active { transform: translateY(0); }

      .button.is-light {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: var(--text) !important;
      }
      .button.is-light:hover:not([disabled]) {
        background: rgba(255, 255, 255, 0.15) !important;
        color: #fff !important;
      }
      .button[disabled] { opacity: 0.45; box-shadow: none; }

      /* Outlined buttons default to dark text on this theme. */
      .button.is-outlined { background: transparent !important; }
      .button.is-danger.is-outlined { color: #f14668 !important; border-color: #f14668 !important; }
      .button.is-danger.is-outlined:hover:not([disabled]) { background: #f14668 !important; color: #fff !important; }

      .input, .textarea, .select select {
        background: rgba(10, 8, 20, 0.5) !important;
        border: 1px solid rgba(140, 103, 239, 0.25) !important;
        color: #fff !important;
        border-radius: 8px;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .input:focus, .textarea:focus, .select select:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 10px rgba(140, 103, 239, 0.3) !important;
      }
      .input::placeholder, .textarea::placeholder {
        color: rgba(255, 255, 255, 0.3) !important;
      }
      .input[disabled], .textarea[disabled], .select select[disabled] {
        color: rgba(255, 255, 255, 0.55) !important;
        background: rgba(10, 8, 20, 0.3) !important;
      }
      .select:not(.is-multiple):not(.is-loading)::after { border-color: var(--accent) !important; }
      /* Native dropdown popups are rendered by the OS: force readable colors. */
      .select select option { background: #16122a; color: #fff; }

      /* Amount fields read better right-aligned and tabular. */
      .input.is-amount {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .file-cta {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(140, 103, 239, 0.25) !important;
        color: var(--text) !important;
      }
      .file-cta:hover { background: rgba(255, 255, 255, 0.15) !important; }
      .file-name {
        background: rgba(10, 8, 20, 0.5) !important;
        border: 1px solid rgba(140, 103, 239, 0.25) !important;
        color: var(--text) !important;
      }

      .table-wrap { overflow-x: auto; }
      .table {
        background: transparent !important;
        color: var(--text) !important;
        width: 100%;
      }
      .table th {
        color: rgba(255, 255, 255, 0.6) !important;
        border-bottom: 2px solid rgba(140, 103, 239, 0.2) !important;
        background: transparent !important;
        white-space: nowrap;
      }
      .table td {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
        vertical-align: middle;
        background: transparent !important;
        color: var(--text) !important;
      }
      .table tfoot td, .table tfoot th {
        border-top: 2px solid rgba(140, 103, 239, 0.25) !important;
        border-bottom: none !important;
        color: #fff !important;
        font-weight: 600;
        background: transparent !important;
      }
      .table tr:hover { background: rgba(140, 103, 239, 0.06) !important; }
      .table.is-striped tbody tr:nth-child(even) {
        background-color: rgba(140, 103, 239, 0.03) !important;
      }
      .has-text-right { text-align: right !important; }
      .is-numeric { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }

      .label { color: rgba(255, 255, 255, 0.7) !important; }
      .help { color: var(--text-muted) !important; }
      .checkbox, .radio { color: var(--text) !important; }
      hr { background-color: var(--border) !important; }

      .tag.is-success {
        background-color: rgba(72, 199, 142, 0.15) !important;
        color: #48c78e !important;
        border: 1px solid rgba(72, 199, 142, 0.3);
      }
      .tag.is-warning {
        background-color: rgba(255, 221, 87, 0.15) !important;
        color: #ffdd57 !important;
        border: 1px solid rgba(255, 221, 87, 0.3);
      }
      .tag.is-danger {
        background-color: rgba(241, 70, 104, 0.15) !important;
        color: #f14668 !important;
        border: 1px solid rgba(241, 70, 104, 0.3);
      }
      .tag.is-info {
        background-color: rgba(62, 142, 208, 0.15) !important;
        color: #6fb3e8 !important;
        border: 1px solid rgba(62, 142, 208, 0.3);
      }

      .message { background: transparent !important; }
      .message.is-warning .message-body {
        background: rgba(255, 221, 87, 0.08) !important;
        border-color: #ffdd57 !important;
        color: #ffe27a !important;
      }
      .message.is-danger .message-body {
        background: rgba(241, 70, 104, 0.08) !important;
        border-color: #f14668 !important;
        color: #ff8098 !important;
      }
      .message.is-info .message-body {
        background: rgba(62, 142, 208, 0.08) !important;
        border-color: #3e8ed0 !important;
        color: #9ccbec !important;
      }
      .message.is-success .message-body {
        background: rgba(72, 199, 142, 0.08) !important;
        border-color: #48c78e !important;
        color: #7ddcb0 !important;
      }

      /* Stat cards on the overview page. */
      .stat-card { position: relative; overflow: hidden; }
      .stat-card::before {
        content: "";
        position: absolute; inset: 0 auto 0 0; width: 4px;
        background: var(--accent);
      }
      .stat-card.is-positive::before { background: #48c78e; }
      .stat-card.is-negative::before { background: #f14668; }
      .stat-card .stat-label {
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.35rem;
      }
      .stat-card .stat-value {
        font-size: 1.85rem;
        font-weight: 700;
        color: #fff;
        font-variant-numeric: tabular-nums;
        line-height: 1.2;
      }
      .stat-card .stat-value.is-positive { color: #48c78e; }
      .stat-card .stat-value.is-negative { color: #f14668; }
      .stat-card .stat-sub { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.3rem; }

      .empty-state {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0.75rem; min-height: 220px; color: var(--text-muted);
      }
      .empty-state .icon { font-size: 2.5rem; opacity: 0.5; }

      .scroll-list { max-height: 68vh; overflow-y: auto; padding-right: 0.25rem; }
      .scroll-list::-webkit-scrollbar { width: 8px; }
      .scroll-list::-webkit-scrollbar-thumb {
        background: rgba(140, 103, 239, 0.35); border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <!-- Trunk will inject the WASM binary and script here -->
  </body>
</html>
