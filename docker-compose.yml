services:
  db:
    profiles: [postgres]
    image: postgres:16
    environment:
      POSTGRES_DB: klubu
      POSTGRES_USER: klubu
      POSTGRES_PASSWORD: klubu-test
    ports:
      - "5433:5432"
    volumes:
      - klubu-data:/var/lib/postgresql/data

  app:
    image: klubu:latest
    build: .
    ports:
      - "8080:8080"
      - "2525:2525"
      - "2143:2143"
    volumes:
      - klubu-sqlite:/app/data
      - klubu-documents:/app/document_storage
      - klubu-mail:/app/mail_storage
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///app/data/klubu.db?mode=rwc}
      KLUBU_EXPORT_TEMPLATES_PATH: /app/templates
      KLUBU_DOCUMENT_STORAGE_PATH: /app/document_storage
      KLUBU_MAIL_STORAGE_PATH: /app/mail_storage

  # Optional — start with `docker compose --profile ai up` for receipt prefill.
  ollama:
    image: ollama/ollama:latest
    profiles: [ai]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    profiles: [ai]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]

volumes:
  klubu-data:
  klubu-sqlite:
  klubu-documents:
  klubu-mail:
  ollama-models:
